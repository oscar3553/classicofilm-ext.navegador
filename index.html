<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassicoFilm TV Prototipo</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }
        h1 {
            color: #e50914;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }
        h2 { font-size: 1.5rem; margin-left: 10px; }
        
        .tv-row {
            display: flex;
            gap: 20px;
            padding: 10px;
        }

        .movie-card {
            min-width: 180px;
            max-width: 180px;
            background-color: #222;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            border: 3px solid transparent;
            cursor: pointer;
        }
        /* El marco blanco cuando pasas el mando o el ratón */
        .movie-card:focus, .movie-card:hover {
            transform: scale(1.08);
            border-color: #fff;
            outline: none;
        }
        .movie-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }
        .movie-card p {
            padding: 8px;
            margin: 0;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <h1>ClassicoFilm TV</h1>
    <h2>Películas de Prueba</h2>
    
    <div class="tv-row">
        
        <div class="movie-card" tabindex="1" onclick="alert('Abriendo Película 1 en la tele...')">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiw9T2EbeoK3h-uU9V3Y6M5O8ZscN3E6MvY6vD8_S6Q/s1600/portada1.jpg" onerror="this.src='https://via.placeholder.com/180x260?text=Cine+1'">
            <p>Muelle de Brumas (1938)</p>
        </div>

        <div class="movie-card" tabindex="2" onclick="alert('Abriendo Película 2 en la tele...')">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiR8O_m4X7L8P6p3X5L2Q6W8Z8vC8MvY6vD8_S6Q/s1600/portada2.jpg" onerror="this.src='https://via.placeholder.com/180x260?text=Cine+2'">
            <p>La soga (1948)</p>
        </div>

        <div class="movie-card" tabindex="3" onclick="alert('Abriendo Película 3 en la tele...')">
            <img src="https://via.placeholder.com/180x260?text=Cine+Clasico">
            <p>El Halcón Maltés (1941)</p>
        </div>

    </div>

</body>
</html>
