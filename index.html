<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassicoFilm TV</title>
    <style>
        body { 
            background-color: #111; 
            color: #fff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 30px; 
            overflow: hidden;
        }
        h1 { color: #e50914; font-size: 2.8rem; margin: 0 0 5px 0; font-weight: bold; }
        h2 { font-size: 1.4rem; margin: 0 0 30px 0; color: #aaa; }
        
        .tv-grid-wrapper {
            width: 100%;
            height: calc(100vh - 150px);
            overflow: hidden;
            position: relative;
        }

        .tv-grid { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 25px; 
            transition: transform 0.15s ease-out; 
        }

        .movie-card { 
            background-color: #222; 
            border-radius: 10px; 
            overflow: hidden; 
            border: 4px solid transparent; 
            box-sizing: border-box;
        }
        
        .movie-card.focused { 
            transform: scale(1.05); 
            border-color: #e50914; 
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.8);
            outline: none; 
        }
        .movie-card img { 
            width: 100%; 
            height: 280px; 
            object-fit: cover; 
            background-color: #333; 
        }
        .movie-card p { 
            padding: 10px; 
            margin: 0; 
            font-size: 1rem; 
            font-weight: bold;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        /* FICHA DE DETALLES (ESTILO NETFLIX INTERMEDIO) */
        #detalles-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 5000;
            align-items: center;
            justify-content: center;
        }
        .modal-contenido {
            background: #1c1c1c;
            padding: 40px;
            border-radius: 15px;
            display: flex;
            gap: 40px;
            max-width: 800px;
            border: 3px solid #333;
            align-items: center;
        }
        .modal-contenido img {
            width: 240px;
            height: 340px;
            object-fit: cover;
            border-radius: 8px;
        }
        .modal-info h3 { margin: 0 0 20px 0; font-size: 2.2rem; color: #fff; }
        
        /* Botón de reproducción enfocado para el mando */
        .btn-play {
            background: #e50914;
            color: white;
            border: 4px solid transparent;
            padding: 15px 40px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-play.focused {
            border-color: white;
            transform: scale(1.08);
            box-shadow: 0 0 15px #fff;
        }

        /* REPRODUCTOR LIMPIO */
        #video-container { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; 
            z-index: 9999; 
        }
        #video-container iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <h1>ClassicoFilm TV</h1>
    <h2 id="estado-titulo">Cargando cine clásico...</h2>
    
    <div class="tv-grid-wrapper">
        <div class="tv-grid" id="catalogo-tv"></div>
    </div>

    <div id="detalles-modal">
        <div class="modal-contenido">
            <img id="modal-img" src="" alt="Portada">
            <div class="modal-info">
                <h3 id="modal-titulo">Título de la Película</h3>
                <button id="btn-reproducir-modal" class="btn-play">▶ REPRODUCIR</button>
            </div>
        </div>
    </div>

    <div id="video-container">
        <iframe id="reproductor" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>

    <script>
        let totalPeliculas = 0;
        const titulosRegistrados = new Set();
        let indiceEnFoco = 0;
        let peliculasElementos = [];
        
        // Estados de la interfaz
        let estadoActual = "CATALOGO"; // CATALOGO, MODAL, REPRODUCTOR
        let urlVideoGlobal = "";
        const columnasFijas = 6;

        function agregarPeliculasAlCatalogo(entradas) {
            const contenedor = document.getElementById('catalogo-tv');
            if (!entradas) return;

            entradas.forEach((entrada) => {
                const titulo = entrada.title.$t;
                if (titulosRegistrados.has(titulo)) return;
                titulosRegistrados.add(titulo);

                let imagenUrl = "https://via.placeholder.com/200x280?text=Cine";
                if (entrada.media$thumbnail) {
                    imagenUrl = entrada.media$thumbnail.url.replace('/s72-c/', '/s1600/');
                }

                const contenidoPost = entrada.content ? entrada.content.$t : "";
                let urlDzen = "";
                const coincidencia = contenidoPost.match(/<iframe[^>]+src="([^">]+)"/);
                if (coincidencia && coincidencia[1]) {
                    urlDzen = coincidencia[1];
                    if (urlDzen.startsWith('//')) urlDzen = 'https:' + urlDzen;
                    if (!urlDzen.includes('autoplay')) {
                        urlDzen += (urlDzen.includes('?') ? '&' : '?') + 'autoplay=1&auto_play=1';
                    }
                }

                const tarjeta = document.createElement('div');
                tarjeta.className = 'movie-card';
                tarjeta.innerHTML = `<img src="${imagenUrl}"><p>${titulo}</p>`;
                tarjeta.dataset.video = urlDzen;
                tarjeta.dataset.title = titulo;
                tarjeta.dataset.img = imagenUrl;

                contenedor.appendChild(tarjeta);
                peliculasElementos.push(tarjeta);
                totalPeliculas++;
            });

            document.getElementById('estado-titulo').innerText = `Catálogo de Cine Clásico (${totalPeliculas} películas)`;
            
            if (peliculasElementos.length > 0 && indiceEnFoco === 0) {
                // Forzamos el foco inicial para que responda el mando inmediatamente sin clics manuales
                setTimeout(actualizarFoco, 500);
            }
        }

        function actualizarFoco() {
            if (estadoActual !== "CATALOGO") return;

            peliculasElementos.forEach(el => el.classList.remove('focused'));
            
            if (peliculasElementos[indiceEnFoco]) {
                const elementoDestino = peliculasElementos[indiceEnFoco];
                elementoDestino.classList.add('focused');
                elementoDestino.focus(); // Forzamos foco de navegador

                const filaActual = Math.floor(indiceEnFoco / columnasFijas);
                const contenedorGrid = document.getElementById('catalogo-tv');
                
                if (filaActual > 1) {
                    const desplazar = (filaActual - 1) * 360;
                    contenedorGrid.style.transform = `translateY(-${desplazar}px)`;
                } else {
                    contenedorGrid.style.transform = `translateY(0px)`;
                }
            }
        }

        // GESTIÓN DE EVENTOS DEL MANDO DE TV
        document.addEventListener('keydown', function(e) {
            const KEY_BACK_LG = 461; 
            const KEY_BACK_STANDARD = 8;
            const KEY_ESCAPE = 27;

            // 1. SI EL VIDEO ESTÁ ABIERTO
            if (estadoActual === "REPRODUCTOR") {
                if (e.keyCode === KEY_BACK_LG || e.keyCode === KEY_BACK_STANDARD || e.keyCode === KEY_ESCAPE || e.key === "Backspace") {
                    e.preventDefault();
                    cerrarVideo();
                }
                return;
            }

            // 2. SI LA FICHA DE DETALLES ESTÁ ABIERTA
            if (estadoActual === "MODAL") {
                if (e.key === "Enter" || e.keyCode === 13) {
                    e.preventDefault();
                    iniciarReproductorReal();
                } else if (e.keyCode === KEY_BACK_LG || e.keyCode === KEY_BACK_STANDARD || e.keyCode === KEY_ESCAPE || e.key === "Backspace") {
                    e.preventDefault();
                    cerrarModal();
                }
                return;
            }

            // 3. EN EL CATÁLOGO (Navegación por flechas)
            switch(e.key) {
                case "ArrowLeft":
                    e.preventDefault();
                    if (indiceEnFoco > 0) { indiceEnFoco--; actualizarFoco(); }
                    break;
                case "ArrowRight":
                    e.preventDefault();
                    if (indiceEnFoco < peliculasElementos.length - 1) { indiceEnFoco++; actualizarFoco(); }
                    break;
                case "ArrowUp":
                    e.preventDefault();
                    if (indiceEnFoco - columnasFijas >= 0) { indiceEnFoco -= columnasFijas; actualizarFoco(); }
                    break;
                case "ArrowDown":
                    e.preventDefault();
                    if (indiceEnFoco + columnasFijas < peliculasElementos.length) { indiceEnFoco += columnasFijas; actualizarFoco(); }
                    break;
                case "Enter":
                    e.preventDefault();
                    const tarjeta = peliculasElementos[indiceEnFoco];
                    if (tarjeta) {
                        mostrarFichaDetalles(tarjeta.dataset.title, tarjeta.dataset.img, tarjeta.dataset.video);
                    }
                    break;
            }
        });

        // Funciones de la Ficha Intermedia
        function mostrarFichaDetalles(titulo, img, videoUrl) {
            estadoActual = "MODAL";
            urlVideoGlobal = videoUrl;

            document.getElementById('modal-titulo').innerText = titulo;
            document.getElementById('modal-img').src = img;
            document.getElementById('detalles-modal').style.display = "flex";
            
            // Colocamos el foco directamente en el botón de reproducir
            document.getElementById('btn-reproducir-modal').classList.add('focused');
            document.getElementById('btn-reproducir-modal').focus();
        }

        function cerrarModal() {
            estadoActual = "CATALOGO";
            document.getElementById('detalles-modal').style.display = "none";
            document.getElementById('btn-reproducir-modal').classList.remove('focused');
            actualizarFoco();
        }

        function iniciarReproductorReal() {
            if (!urlVideoGlobal) return;
            estadoActual = "REPRODUCTOR";
            
            document.getElementById('detalles-modal').style.display = "none";
            document.getElementById('reproductor').src = urlVideoGlobal;
            document.getElementById('video-container').style.display = "block";
            document.getElementById('video-container').focus();
        }

        function cerrarVideo() {
            document.getElementById('video-container').style.display = "none";
            document.getElementById('reproductor').src = "";
            
            // En lugar de ir al catálogo, volvemos a abrir la ficha de esa película de forma limpia
            const tarjeta = peliculasElementos[indiceEnFoco];
            mostrarFichaDetalles(tarjeta.dataset.title, tarjeta.dataset.img, tarjeta.dataset.video);
        }

        // Carga desde Blogger
        function bloqueNuevas(datos) { agregarPeliculasAlCatalogo(datos.feed.entry); }
        function bloqueMedio(datos) { agregarPeliculasAlCatalogo(datos.feed.entry); }
        function bloqueAntiguas(datos) { agregarPeliculasAlCatalogo(datos.feed.entry); }

        function lanzarCargaCompleta() {
            const s1 = document.createElement('script');
            s1.src = "https://www.classicofilm.com/feeds/posts/default?alt=json-in-script&start-index=1&max-results=150&callback=bloqueNuevas";
            document.body.appendChild(s1);

            const s2 = document.createElement('script');
            s2.src = "https://www.classicofilm.com/feeds/posts/default?alt=json-in-script&start-index=151&max-results=150&callback=bloqueMedio";
            document.body.appendChild(s2);

            const s3 = document.createElement('script');
            s3.src = "https://www.classicofilm.com/feeds/posts/default?alt=json-in-script&start-index=301&max-results=150&callback=bloqueAntiguas";
            document.body.appendChild(s3);
        }

        window.onload = lanzarCargaCompleta;
    </script>
</body>
</html>
