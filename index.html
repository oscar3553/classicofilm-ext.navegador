<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassicoFilm TV</title>
    <style>
        body { 
            background-color: #111; 
            color: #fff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 30px; 
            overflow: hidden; /* Evitamos que el navegador haga scroll por su cuenta */
        }
        h1 { color: #e50914; font-size: 2.8rem; margin: 0 0 5px 0; font-weight: bold; }
        h2 { font-size: 1.4rem; margin: 0 0 30px 0; color: #aaa; }
        
        /* Contenedor del Panel fijo */
        .tv-grid-wrapper {
            width: 100%;
            height: calc(100vh - 150px);
            overflow: hidden;
            position: relative;
        }

        .tv-grid { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); /* Forzamos 6 columnas fijas para un movimiento instantáneo */
            gap: 25px; 
            transition: transform 0.15s ease-out; /* Animación de subida/bajada ultra rápida */
        }

        .movie-card { 
            background-color: #222; 
            border-radius: 10px; 
            overflow: hidden; 
            border: 4px solid transparent; 
            cursor: pointer; 
            box-sizing: border-box;
        }
        
        .movie-card.focused { 
            transform: scale(1.05); 
            border-color: #e50914; 
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.8);
            outline: none; 
        }
        .movie-card img { 
            width: 100%; 
            height: 280px; 
            object-fit: cover; 
            background-color: #333; 
        }
        .movie-card p { 
            padding: 10px; 
            margin: 0; 
            font-size: 1rem; 
            font-weight: bold;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        /* Pantalla completa limpia para el reproductor */
        #video-container { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; 
            z-index: 9999; 
        }
        #video-container iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <h1>ClassicoFilm TV</h1>
    <h2 id="estado-titulo">Cargando cine clásico...</h2>
    
    <div class="tv-grid-wrapper">
        <div class="tv-grid" id="catalogo-tv"></div>
    </div>

    <!-- Contenedor del reproductor 100% limpio (Sin cartel de cerrar) -->
    <div id="video-container">
        <iframe id="reproductor" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>

    <script>
        let totalPeliculas = 0;
        const titulosRegistrados = new Set();
        let indiceEnFoco = 0;
        let peliculasElementos = [];
        let reproductorAbierto = false;
        const columnasFijas = 6; // Estructura fija para que la tele no sufra pensando los saltos

        function agregarPeliculasAlCatalogo(entradas) {
            const contenedor = document.getElementById('catalogo-tv');
            if (!entradas) return;

            entradas.forEach((entrada) => {
                const titulo = entrada.title.$t;
                if (titulosRegistrados.has(titulo)) return;
                titulosRegistrados.add(titulo);

                let imagenUrl = "https://via.placeholder.com/200x280?text=Cine";
                if (entrada.media$thumbnail) {
                    imagenUrl = entrada.media$thumbnail.url.replace('/s72-c/', '/s1600/');
                }

                const contenidoPost = entrada.content ? entrada.content.$t : "";
                let urlDzen = "";
                const coincidencia = contenidoPost.match(/<iframe[^>]+src="([^">]+)"/);
                if (coincidencia && coincidencia[1]) {
                    urlDzen = coincidencia[1];
                    if (urlDzen.startsWith('//')) urlDzen = 'https:' + urlDzen;
                    
                    // Modificamos la URL de Dzen para que intente el AutoPlay automáticamente si el navegador lo permite
                    if (!urlDzen.includes('autoplay')) {
                        urlDzen += (urlDzen.includes('?') ? '&' : '?') + 'autoplay=1&auto_play=1';
                    }
                }

                const tarjeta = document.createElement('div');
                tarjeta.className = 'movie-card';
                tarjeta.innerHTML = `<img src="${imagenUrl}"><p>${titulo}</p>`;
                tarjeta.dataset.video = urlDzen;

                tarjeta.addEventListener('click', () => abrirVideo(urlDzen));

                contenedor.appendChild(tarjeta);
                peliculasElementos.push(tarjeta);
                totalPeliculas++;
            });

            document.getElementById('estado-titulo').innerText = `Catálogo de Cine Clásico (${totalPeliculas} películas)`;
            
            if (peliculasElementos.length > 0 && indiceEnFoco === 0) {
                actualizarFoco();
            }
        }

        function actualizarFoco() {
            peliculasElementos.forEach(el => el.classList.remove('focused'));
            
            if (peliculasElementos[indiceEnFoco]) {
                const elementoDestino = peliculasElementos[indiceEnFoco];
                elementoDestino.classList.add('focused');
                
                // Cálculo ultra rápido de desplazamiento vertical
                const filaActual = Math.floor(indiceEnFoco / columnasFijas);
                const contenedorGrid = document.getElementById('catalogo-tv');
                
                // Desplazamos el grid hacia arriba en bloques controlados (350px por fila aproximado)
                if (filaActual > 1) {
                    const desplazar = (filaActual - 1) * 360;
                    contenedorGrid.style.transform = `translateY(-${desplazar}px)`;
                } else {
                    contenedorGrid.style.transform = `translateY(0px)`;
                }
            }
        }

        // CONTROL EXCLUSIVO POR MANDO DE TV
        document.addEventListener('keydown', function(e) {
            // CÓDIGOS DE BOTONES DE MANDOS SMART TV (LG webOS / Tizen / Estándar)
            const KEY_OK = 13;
            const KEY_BACK_LG = 461; 
            const KEY_BACK_STANDARD = 8;
            const KEY_ESCAPE = 27;
            const KEY_PLAY = 415;
            const KEY_PAUSE = 19;

            if (reproductorAbierto) {
                // Si el reproductor está abierto, capturamos el botón ATRÁS para cerrar el vídeo
                if (e.keyCode === KEY_BACK_LG || e.keyCode === KEY_BACK_STANDARD || e.keyCode === KEY_ESCAPE || e.key === "Backspace") {
                    e.preventDefault();
                    cerrarVideo();
                }
                
                // Control Remoto: Play / Pause directo al iframe si es compatible
                const iframe = document.getElementById('reproductor');
                if (e.keyCode === KEY_PLAY) {
                    iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                    iframe.contentWindow.postMessage('{"command":"play"}', '*');
                }
                if (e.keyCode === KEY_PAUSE) {
                    iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                    iframe.contentWindow.postMessage('{"command":"pause"}', '*');
                }
                return;
            }

            // Navegación fluida en el catálogo
            switch(e.key) {
                case "ArrowLeft":
                    e.preventDefault();
                    if (indiceEnFoco > 0) {
                        indiceEnFoco--;
                        actualizarFoco();
                    }
                    break;
                case "ArrowRight":
                    e.preventDefault();
                    if (indiceEnFoco < peliculasElementos.length - 1) {
                        indiceEnFoco++;
                        actualizarFoco();
                    }
                    break;
                case "ArrowUp":
                    e.preventDefault();
                    if (indiceEnFoco - columnasFijas >= 0) {
                        indiceEnFoco -= columnasFijas;
                        actualizarFoco();
                    }
                    break;
                case "ArrowDown":
                    e.preventDefault();
                    if (indiceEnFoco + columnasFijas < peliculasElementos.length) {
                        indiceEnFoco += columnasFijas;
                        actualizarFoco();
                    }
                    break;
                case "Enter":
                    e.preventDefault();
                    const urlVideo = peliculasElementos[indiceEnFoco].dataset.video;
                    if (urlVideo) abrirVideo(urlVideo);
                    break;
            }
        });

        function abrirVideo(url) {
            if (!url) return;
            reproductorAbierto = true;
            
            const contenedorVideo = document.getElementById('video-container');
            const iframe = document.getElementById('reproductor');
            
            iframe.src = url;
            contenedorVideo.style.display = "block";
            
            // Forzamos el foco dentro del contenedor del vídeo para aislar el menú trasero
            contenedorVideo.focus();
        }

        function cerrarVideo() {
            reproductorAbierto = false;
            document.getElementById('video-container').style.display = "none";
            document.getElementById('reproductor').src = "";
            
            // Al regresar, el catálogo recupera el control de forma inmediata
            setTimeout(actualizarFoco, 50);
        }

        // Motor de inyección de datos de Blogger
        function bloqueNuevas(datos) { agregarPeliculasAlCatalogo(datos.feed.entry); }
        function bloqueMedio(datos) { agregarPeliculasAlCatalogo(datos.feed.entry); }
        function bloqueAntiguas(datos) { agregarPeliculasAlCatalogo(datos.feed.entry); }

        function lanzarCargaCompleta() {
            const s1 = document.createElement('script');
            s1.src = "https://www.classicofilm.com/feeds/posts/default?alt=json-in-script&start-index=1&max-results=150&callback=bloqueNuevas";
            document.body.appendChild(s1);

            const s2 = document.createElement('script');
            s2.src = "https://www.classicofilm.com/feeds/posts/default?alt=json-in-script&start-index=151&max-results=150&callback=bloqueMedio";
            document.body.appendChild(s2);

            const s3 = document.createElement('script');
            s3.src = "https://www.classicofilm.com/feeds/posts/default?alt=json-in-script&start-index=301&max-results=150&callback=bloqueAntiguas";
            document.body.appendChild(s3);
        }

        lanzarCargaCompleta();
    </script>
</body>
</html>
