<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassicoFilm TV Prototipo</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }
        h1 {
            color: #e50914;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }
        h2 { font-size: 1.5rem; margin-left: 10px; }
        
        .tv-row {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 10px;
            scroll-behavior: smooth;
        }
        .tv-row::-webkit-scrollbar { display: none; }

        .movie-card {
            min-width: 180px;
            max-width: 180px;
            background-color: #222;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            border: 3px solid transparent;
            cursor: pointer;
        }
        .movie-card:focus, .movie-card:hover {
            transform: scale(1.08);
            border-color: #fff;
            outline: none;
        }
        .movie-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }
        .movie-card p {
            padding: 8px;
            margin: 0;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <h1>ClassicoFilm TV</h1>
    <h2>Últimas Películas Añadidas</h2>
    
    <div class="tv-row" id="catalogo-tv">
        <p id="cargando">Conectando con el catálogo de películas...</p>
    </div>

    <script>
        // Usamos un puente público gratuito (allorigins) para saltar el bloqueo de seguridad de tu web
        const blogUrl = encodeURIComponent("https://classicofilm.blogspot.com/feeds/posts/default?alt=json&max-results=30");
        const puenteUrl = `https://api.allorigins.win/get?url=${blogUrl}`;

        async function conectarConBlogger() {
            try {
                const respuesta = await fetch(puenteUrl);
                const lasOpciones = await respuesta.json();
                
                // Convertimos el texto recibido en datos utilizables
                const datos = JSON.parse(lasOpciones.contents);
                const entradas = datos.feed.entry;
                const contenedor = document.getElementById('catalogo-tv');
                
                contenedor.innerHTML = "";

                if(!entradas || entradas.length === 0) {
                    contenedor.innerHTML = "<p>No se encontraron películas en el feed.</p>";
                    return;
                }

                entradas.forEach((entrada, index) => {
                    const titulo = entrada.title.$t;
                    
                    // Conseguir la imagen original en alta calidad
                    let imagenUrl = "https://via.placeholder.com/180x260?text=Sin+Portada";
                    if (entrada.media$thumbnail) {
                        imagenUrl = entrada.media$thumbnail.url.replace('/s72-c/', '/s1600/');
                    }

                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'movie-card';
                    tarjeta.tabIndex = index + 1; 
                    tarjeta.innerHTML = `
                        <img src="${imagenUrl}" alt="${titulo}">
                        <p>${titulo}</p>
                    `;

                    tarjeta.addEventListener('click', () => {
                        alert("Has seleccionado: " + titulo);
                    });

                    contenedor.appendChild(tarjeta);
                });

            } catch (error) {
                document.getElementById('cargando').innerText = "Error al procesar el catálogo. Reintentando de forma directa...";
                console.error(error);
            }
        }

        conectarConBlogger();
    </script>
</body>
</html>
