<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassicoFilm TV</title>
    <style>
        body { background-color: #111; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; overflow: hidden; }
        h1 { color: #e50914; font-size: 2.5rem; margin-bottom: 5px; }
        h2 { font-size: 1.5rem; margin-top: 5px; color: #aaa; }
        .tv-row { display: flex; gap: 20px; overflow-x: auto; padding: 15px 10px; }
        .tv-row::-webkit-scrollbar { display: none; }
        .movie-card { min-width: 180px; max-width: 180px; background-color: #222; border-radius: 8px; overflow: hidden; transition: transform 0.2s; border: 3px solid transparent; cursor: pointer; }
        .movie-card:focus, .movie-card:hover { transform: scale(1.06); border-color: #fff; outline: none; }
        .movie-card img { width: 100%; height: 260px; object-fit: cover; background-color: #333; }
        .movie-card p { padding: 8px; margin: 0; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #video-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        #video-container iframe { width: 100%; height: 100%; border: none; }
        #btn-cerrar { position: absolute; top: 20px; right: 20px; background: #e50914; color: white; border: none; padding: 10px 20px; font-size: 1rem; border-radius: 5px; cursor: pointer; font-weight: bold; z-index: 10000; }
    </style>
</head>
<body>

    <h1>ClassicoFilm TV</h1>
    <h2 id="estado-titulo">Cargando catálogo completo de cine...</h2>
    <div class="tv-row" id="catalogo-tv"></div>

    <div id="video-container">
        <button id="btn-cerrar" onclick="cerrarVideo()">❌ CERRAR</button>
        <iframe id="reproductor" src="" allowfullscreen></iframe>
    </div>

    <script>
        let totalPeliculas = 0;
        let indiceInicio = 1;
        const maxPorLlamada = 150;

        // Función para lanzar la siguiente petición en segundo plano
        function solicitarSiguienteBloque() {
            const script = document.createElement('script');
            script.src = `https://www.classicofilm.com/feeds/posts/default?alt=json-in-script&start-index=${indiceInicio}&max-results=${maxPorLlamada}&callback=miBuscadorDePeliculas`;
            document.body.appendChild(script);
        }

        // Esta función procesa los bloques que Blogger le va mandando
        function miBuscadorDePeliculas(datos) {
            const entradas = datos.feed.entry;
            const contenedor = document.getElementById('catalogo-tv');

            // Si ya no vienen más películas en este bloque, terminamos
            if (!entradas || entradas.length === 0) {
                if (totalPeliculas === 0) {
                    document.getElementById('estado-titulo').innerText = "No se encontraron películas.";
                }
                return;
            }

            entradas.forEach((entrada) => {
                const titulo = entrada.title.$t;
                
                let imagenUrl = "https://via.placeholder.com/180x260?text=Cine";
                if (entrada.media$thumbnail) {
                    imagenUrl = entrada.media$thumbnail.url.replace('/s72-c/', '/s1600/');
                }

                const contenidoPost = entrada.content ? entrada.content.$t : "";
                let urlDzen = "";
                const coincidencia = contenidoPost.match(/<iframe[^>]+src="([^">]+)"/);
                if (coincidencia && coincidencia[1]) {
                    urlDzen = coincidencia[1];
                    if (urlDzen.startsWith('//')) urlDzen = 'https:' + urlDzen;
                }

                totalPeliculas++;

                const tarjeta = document.createElement('div');
                tarjeta.className = 'movie-card';
                tarjeta.tabIndex = totalPeliculas;
                tarjeta.innerHTML = `<img src="${imagenUrl}"><p>${titulo}</p>`;

                tarjeta.addEventListener('click', () => {
                    if (urlDzen) {
                        document.getElementById('reproductor').src = urlDzen;
                        document.getElementById('video-container').style.display = "block";
                        document.getElementById('btn-cerrar').focus();
                    } else {
                        alert("Esta película no tiene un reproductor de Dzen detectable.");
                    }
                });

                contenedor.appendChild(tarjeta);
            });

            document.getElementById('estado-titulo').innerText = `Catálogo Automático (${totalPeliculas} películas)`;

            // Si el bloque vino lleno (150 películas), avanzamos el índice y pedimos el siguiente lote
            if (entradas.length === maxPorLlamada) {
                indiceInicio += maxPorLlamada;
                setTimeout(solicitarSiguienteBloque, 300); // Pequeña pausa de seguridad
            }
        }

        function cerrarVideo() {
            document.getElementById('video-container').style.display = "none";
            document.getElementById('reproductor').src = "";
        }

        // Arrancar la carga del primer bloque nada más abrir la web
        solicitarSiguienteBloque();
    </script>

</body>
</html>
