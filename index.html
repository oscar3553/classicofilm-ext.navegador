<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasicofilm TV - Extensión</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #0c0c0c; 
            color: #fff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            min-height: 100vh;
            overflow-y: auto;
        }
        
        /* Encabezado fijo y moderno estilo Streaming */
        .header-tv {
            text-align: center;
            padding: 20px;
            position: sticky;
            top: 0; left: 0; width: 100%;
            background: rgba(12, 12, 12, 0.95);
            backdrop-filter: blur(15px);
            z-index: 10;
            border-bottom: 1px solid #1a1a1a;
        }
        .logo-container img {
            max-height: 60px;
            width: auto;
            filter: drop-shadow(0px 0px 10px rgba(229, 9, 20, 0.2));
        }
        h2 { 
            font-size: 0.9rem; 
            margin: 5px 0 15px 0; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }
        
        /* Controles de Búsqueda y Filtros Premium */
        .controles-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
        }
        .caja-busqueda {
            width: 100%;
            max-width: 450px;
            padding: 12px 20px;
            font-size: 1rem;
            background-color: #151515;
            border: 1px solid #252525;
            border-radius: 30px;
            color: white;
            outline: none;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        .caja-busqueda:focus {
            border-color: #e50914;
            background-color: #1a1a1a;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.3);
        }
        .contenedor-generos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            width: 100%;
            max-height: 120px;
            overflow-y: auto;
            padding: 5px;
        }
        /* Personalizar barra de scroll de los géneros */
        .contenedor-generos::-webkit-scrollbar { width: 6px; }
        .contenedor-generos::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        
        .btn-genero {
            background-color: #1c1c1c;
            color: #aaa;
            border: 1px solid #2c2c2c;
            padding: 8px 16px;
            font-size: 0.85rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .btn-genero:hover, .btn-genero.activo {
            background-color: #e50914;
            color: white;
            border-color: #e50914;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.4);
        }
        
        /* Contenedor de la rejilla */
        .tv-grid-wrapper {
            width: 100%;
            padding: 25px;
        }
        .tv-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px; 
        }

        /* Tarjetas de Películas estilo Netflix */
        .movie-card { 
            background-color: #141414; 
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid #222; 
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: white;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .movie-card:hover { 
            transform: translateY(-5px) scale(1.03); 
            border-color: #e50914; 
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3);
        }
        .movie-card img { 
            width: 100%; 
            height: 260px; 
            object-fit: cover; 
            background-color: #252525; 
            transition: transform 0.3s ease;
        }
        .movie-card:hover img {
            transform: scale(1.02);
        }
        .movie-card p { 
            padding: 12px 8px; 
            margin: 0; 
            font-size: 0.85rem; 
            font-weight: 600;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            text-align: center;
            background: #141414;
            color: #e0e0e0;
        }

        /* VISTA DETALLE DE LA PELÍCULA (MODAL FLOJANTE) - CLÓN APK */
        .modal-detalle {
            display: none; /* Oculto por defecto */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .tarjeta-detalle {
            background: #141414;
            border: 1px solid #282828;
            border-radius: 12px;
            width: 100%;
            max-width: 750px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
            position: relative;
        }
        .detalle-izquierda {
            width: 40%;
            background: #000;
        }
        .detalle-izquierda img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .detalle-derecha {
            width: 60%;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .detalle-titulo {
            font-size: 1.5rem;
            margin: 0 0 15px 0;
            font-weight: bold;
            color: #fff;
        }
        .detalle-info-linea {
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .info-etiqueta { color: #e50914; font-weight: bold; text-transform: uppercase; margin-right: 8px; }
        .info-valor { color: #fff; background: #252525; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; margin-right: 5px; }

        /* Botones de Servidores Premium */
        .contenedor-botones-servidores {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }
        .btn-servidor {
            width: 100%;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-dzen {
            background: #2ea1f8;
            color: white;
            box-shadow: 0 0 10px rgba(46, 161, 248, 0.3);
        }
        .btn-dzen:hover { background: #1d90e7; }
        
        .btn-odysee {
            background: #ef5e5e;
            color: white;
            box-shadow: 0 0 10px rgba(239, 94, 94, 0.3);
        }
        .btn-odysee:hover { background: #df4949; }

        .btn-volver-menu {
            background: #222;
            color: #bbb;
            border: 1px solid #333;
        }
        .btn-volver-menu:hover { background: #333; color: #fff; }
        
        .btn-servidor:active { transform: scale(0.98); }

        /* REPRODUCTOR PANTALLA COMPLETA (Sigue sirviendo para cuando se pulse un servidor) */
        #reproductor-pantalla-completa {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
        }
        #reproductor-pantalla-completa iframe { width: 100%; height: 100%; border: none; }
        .btn-cerrar {
            position: absolute;
            top: 20px; right: 20px;
            background: #e50914;
            color: white;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: background 0.2s;
        }
        .btn-cerrar:hover { background: #b80710; }
    </style>
</head>
<body>

    <!-- Encabezado -->
    <div class="header-tv">
        <div class="logo-container">
            <img src="https://blogger.googleusercontent.com/img/a/AVvXsEgpLF6ROFXXw42soEaNVYLsA7ZPqgnzhGWN-id-bGZ0GfPbfeO08bxXlPv6KgdiOPMAOrsjOu8V-WXIUhlTYRYlU6KQthnIL0VcP1-D1l7CJImrszfdjCImWIMOMgoBYl5MwPot7B7SeRqyx3TzBUP2q1AXRgr_hS1zlGMPnh4VEMTvEz9Lq0f1AytDFWog=s158" alt="Clasicofilm TV" onerror="this.style.display='none'; document.getElementById('alt-title').style.display='block';">
            <h1 id="alt-title" style="display:none; color:#e50914; margin:0; font-size: 1.5rem;">Clasicofilm TV</h1>
        </div>
        <h2 id="estado-titulo">Cargando películas clásicas...</h2>
        
        <div class="controles-container">
            <input type="text" id="buscador-cine" class="caja-busqueda" placeholder="Buscar película por título...">
            <div id="lista-generos" class="contenedor-generos"></div>
        </div>
    </div>
    
    <!-- Rejilla de Películas -->
    <div class="tv-grid-wrapper">
        <div class="tv-grid" id="catalogo-tv"></div>
    </div>

    <!-- PANTALLA FLOTANTE DE DETALLE (EL CLÓN DE TU APK) -->
    <div id="modal-detalle-pelicula" class="modal-detalle">
        <div class="tarjeta-detalle">
            <div class="detalle-izquierda">
                <img id="modal-caratula" src="" alt="Carátula">
            </div>
            <div class="detalle-derecha">
                <div id="modal-titulo" class="detalle-titulo">Título de la Película</div>
                
                <div class="detalle-info-linea">
                    <span class="info-etiqueta">Año:</span>
                    <span id="modal-anio" class="info-valor">1969</span>
                </div>
                
                <div class="detalle-info-linea">
                    <span class="info-etiqueta">Género:</span>
                    <span id="modal-generos"></span>
                </div>
                
                <div class="contenedor-botones-servidores">
                    <button id="btn-play-dzen" class="btn-servidor btn-dzen">▶ Reproducir en Dzen.ru</button>
                    <button id="btn-play-odysee" class="btn-servidor btn-odysee">▶ Reproducir en Odysee</button>
                    <button id="btn-cerrar-modal" class="btn-servidor btn-volver-menu">✕ Volver al menú</button>
                </div>
            </div>
        </div>
    </div>

    <!-- REPRODUCTOR PANTALLA COMPLETA -->
    <div id="reproductor-pantalla-completa">
        <button class="btn-cerrar" id="close-player-btn">✕ Volver a la Ficha</button>
        <div id="video-container-tv" style="width:100%; height:100%;"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
