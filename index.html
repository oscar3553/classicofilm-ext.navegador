<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasicofilm TV - Extensión</title>
    <style>
        * { box-sizing: border-box; }
       body { 
            background-color: #0c0c0c; 
            color: #fff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            width: 100%; /* Ahora ocupa todo el ancho de la pantalla */
            min-height: 100vh;
            overflow-y: auto;
            position: relative;
        }
        
        /* Encabezado */
        .header-tv {
            height: 100px;
            text-align: center;
            padding-top: 15px;
            position: sticky;
            top: 0; left: 0; width: 100%;
            background: linear-gradient(to bottom, rgba(12,12,12,1), rgba(12,12,12,0.85), transparent);
            z-index: 10;
        }
        .logo-container img {
            max-height: 50px;
            width: auto;
        }
        h2 { font-size: 1rem; margin: 3px 0 0 0; color: #aaa; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Contenedor adaptativo */
        .tv-grid-wrapper {
            width: 100%;
            padding: 10px 20px 30px 20px;
        }

        .tv-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); /* 4 columnas fijas en el popup */
            gap: 15px; 
        }

        /* Tarjetas optimizadas para PC */
        .movie-card { 
            background-color: #1a1a1a; 
            border-radius: 6px; 
            overflow: hidden; 
            border: 3px solid transparent; 
            display: block;
            text-decoration: none;
            color: white;
            transition: transform 0.2s ease, border-color 0.2s ease;
            height: 240px;
            cursor: pointer;
        }
        
        .movie-card:hover, .movie-card.focused { 
            transform: scale(1.04); 
            border-color: #e50914; 
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.5);
            outline: none; 
        }
        .movie-card img { 
            width: 100%; 
            height: 190px; 
            object-fit: cover; 
            background-color: #252525; 
        }
        .movie-card p { 
            padding: 5px; 
            margin: 0; 
            font-size: 0.85rem; 
            font-weight: bold;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            text-align: center;
        }

        /* REPRODUCTOR PANTALLA COMPLETA EN NAVEGADOR */
        #reproductor-pantalla-completa {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
        }
        #reproductor-pantalla-completa iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .btn-cerrar {
            position: absolute;
            top: 20px; right: 20px;
            background: #e50914;
            color: white;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .btn-cerrar:hover {
            background: #b80710;
        }
    </style>
</head>
<body>

    <div class="header-tv">
        <div class="logo-container">
            <img src="https://blogger.googleusercontent.com/img/a/AVvXsEgpLF6ROFXXw42soEaNVYLsA7ZPqgnzhGWN-id-bGZ0GfPbfeO08bxXlPv6KgdiOPMAOrsjOu8V-WXIUhlTYRYlU6KQthnIL0VcP1-D1l7CJImrszfdjCImWIMOMgoBYl5MwPot7B7SeRqyx3TzBUP2q1AXRgr_hS1zlGMPnh4VEMTvEz9Lq0f1AytDFWog=s158" alt="Clasicofilm TV" onerror="this.style.display='none'; document.getElementById('alt-title').style.display='block';">
            <h1 id="alt-title" style="display:none; color:#e50914; margin:0; font-size: 1.5rem;">Clasicofilm TV</h1>
        </div>
        <h2 id="estado-titulo">Cargando películas clásicas...</h2>
    </div>
    
    <div class="tv-grid-wrapper">
        <div class="tv-grid" id="catalogo-tv"></div>
    </div>

    <div id="reproductor-pantalla-completa">
        <button class="btn-cerrar" id="close-player-btn">✕ Volver al Catálogo</button>
        <div id="video-container-tv" style="width:100%; height:100%;"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
