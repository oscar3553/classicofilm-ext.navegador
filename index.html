<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassicoFilm TV Lector Universal</title>
    <script src="https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/feednami-client/feednami-1.3.1.min.js"></script>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }
        h1 { color: #e50914; font-size: 2.5rem; margin-bottom: 5px; }
        h2 { font-size: 1.5rem; margin-top: 5px; color: #aaa; }
        
        .tv-row {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 15px 10px;
            scroll-behavior: smooth;
        }
        .tv-row::-webkit-scrollbar { display: none; }

        .movie-card {
            min-width: 180px;
            max-width: 180px;
            background-color: #222;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            border: 3px solid transparent;
            cursor: pointer;
        }
        .movie-card:focus, .movie-card:hover {
            transform: scale(1.06);
            border-color: #fff;
            outline: none;
        }
        .movie-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            background-color: #333;
        }
        .movie-card p {
            padding: 8px;
            margin: 0;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #consola-depuracion {
            background: #222;
            color: #00ff00;
            padding: 10px;
            font-family: monospace;
            font-size: 0.8rem;
            border-radius: 5px;
            margin-top: 30px;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <h1>ClassicoFilm TV</h1>
    <h2 id="estado-titulo">Conectando con el lector universal Feednami...</h2>
    
    <div class="tv-row" id="catalogo-tv">
        </div>

    <div id="consola-depuracion">Log de estado: Iniciando lector...</div>

    <script>
        function log(texto) {
            document.getElementById('consola-depuracion').innerHTML += "<br>> " + texto;
        }

        // Usamos la dirección directa de feed de Blogger (pedimos 50 para probar)
        const urlBlog = 'https://classicofilm.blogspot.com/feeds/posts/default?max-results=50';

        function cargarPeliculas() {
            const contenedor = document.getElementById('catalogo-tv');
            log("Llamando a Feednami para procesar: " + urlBlog);

            feednami.load(urlBlog, function(result) {
                if (result.error) {
                    log("ERROR CRÍTICO FEEDNAMI: " + result.error);
                    document.getElementById('estado-titulo').innerText = "Error al conectar con el lector.";
                } else {
                    log("¡Datos recibidos con éxito desde Feednami!");
                    contenedor.innerHTML = "";
                    const entradas = result.feed.entries;

                    if(!entradas || entradas.length === 0) {
                        log("Aviso: No se encontraron entradas en el feed devuelto.");
                        document.getElementById('estado-titulo').innerText = "Catálogo vacío.";
                        return;
                    }

                    log("Procesando " + entradas.length + " películas encontradas...");
                    document.getElementById('estado-titulo').innerText = "Últimas Películas Añadidas (Automático)";

                    entradas.forEach((entrada, index) => {
                        const titulo = entrada.title;
                        let imagenUrl = "https://via.placeholder.com/180x260?text=Cine";
                        
                        if (entrada.description) {
                            const coincidenciaImg = entrada.description.match(/<img[^>]+src="([^">]+)"/);
                            if (coincidenciaImg && coincidenciaImg[1]) {
                                imagenUrl = coincidenciaImg[1];
                            }
                        }

                        const tarjeta = document.createElement('div');
                        tarjeta.className = 'movie-card';
                        tarjeta.tabIndex = index + 1; 
                        tarjeta.innerHTML = `
                            <img src="${imagenUrl}" alt="${titulo}" onerror="this.src='https://via.placeholder.com/180x260?text=Cine'">
                            <p>${titulo}</p>
                        `;

                        tarjeta.addEventListener('click', () => {
                            alert("Has seleccionado: " + titulo);
                        });

                        contenedor.appendChild(tarjeta);
                    });
                    log("¡Catálogo renderizado correctamente!");
                }
            });
        }

        // Ejecutar
        cargarPeliculas();
    </script>
</body>
</html>
