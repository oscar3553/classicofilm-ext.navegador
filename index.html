<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassicoFilm TV</title>
    <style>
        body { background-color: #111; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; overflow: hidden; }
        h1 { color: #e50914; font-size: 2.5rem; margin-bottom: 5px; }
        h2 { font-size: 1.5rem; margin-top: 5px; color: #aaa; }
        .tv-row { display: flex; gap: 20px; overflow-x: auto; padding: 15px 10px; }
        .tv-row::-webkit-scrollbar { display: none; }
        .movie-card { min-width: 180px; max-width: 180px; background-color: #222; border-radius: 8px; overflow: hidden; transition: transform 0.2s; border: 3px solid transparent; cursor: pointer; }
        .movie-card:focus, .movie-card:hover { transform: scale(1.06); border-color: #fff; outline: none; }
        .movie-card img { width: 100%; height: 260px; object-fit: cover; background-color: #333; }
        .movie-card p { padding: 8px; margin: 0; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #video-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        #video-container iframe { width: 100%; height: 100%; border: none; }
        #btn-cerrar { position: absolute; top: 20px; right: 20px; background: #e50914; color: white; border: none; padding: 10px 20px; font-size: 1rem; border-radius: 5px; cursor: pointer; font-weight: bold; z-index: 10000; }
    </style>
</head>
<body>

    <h1>ClassicoFilm TV</h1>
    <h2 id="estado-titulo">Cargando catálogo en bloques seguros...</h2>
    <div class="tv-row" id="catalogo-tv"></div>

    <div id="video-container">
        <button id="btn-cerrar" onclick="cerrarVideo()">❌ CERRAR</button>
        <iframe id="reproductor" src="" allowfullscreen></iframe>
    </div>

    <script>
        let totalPeliculasCargadas = 0;
        const maxPorBloque = 50; // Cargamos de 50 en 50 para evitar errores de saturación
        let indiceInicio = 1;

        async function cargarBloque() {
            // Usamos la ruta exacta que funcionó en tu captura exitosa
            const blogUrl = `https://www.classicofilm.com/feeds/posts/default?alt=json&start-index=${indiceInicio}&max-results=${maxPorBloque}`;
            const puenteUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(blogUrl)}`;

            try {
                const r = await fetch(puenteUrl);
                const j = await r.json();
                const datos = JSON.parse(j.contents);
                const entradas = datos.feed.entry;
                const contenedor = document.getElementById('catalogo-tv');

                if (!entradas || entradas.length === 0) {
                    if (totalPeliculasCargadas === 0) {
                        document.getElementById('estado-titulo').innerText = "No se encontraron películas.";
                    }
                    return; // Ya no hay más películas que cargar
                }

                entradas.forEach((entrada) => {
                    const titulo = entrada.title.$t;
                    const idPost = entrada.id.$t.split('post-')[1];
                    
                    let imagenUrl = "https://via.placeholder.com/180x260?text=Cine";
                    if (entrada.media$thumbnail) {
                        imagenUrl = entrada.media$thumbnail.url.replace('/s72-c/', '/s1600/');
                    }

                    totalPeliculasCargadas++;

                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'movie-card';
                    tarjeta.tabIndex = totalPeliculasCargadas;
                    tarjeta.innerHTML = `<img src="${imagenUrl}"><p>${titulo}</p>`;

                    // Al hacer clic, busca el vídeo de Dzen solo para esta película
                    tarjeta.addEventListener('click', () => buscarVideoYReproducir(idPost));

                    contenedor.appendChild(tarjeta);
                });

                document.getElementById('estado-titulo').innerText = `Catálogo Automático (${totalPeliculasCargadas} películas)`;

                // Si Blogger nos devolvió el bloque lleno, significa que probablemente hay más películas.
                // Avanzamos el índice y pedimos las siguientes 50 automáticamente en segundo plano.
                if (entradas.length === maxPorBloque && totalPeliculasCargadas < 550) {
                    indiceInicio += maxPorBloque;
                    setTimeout(cargarBloque, 500); // Pausa de medio segundo para no saturar
                }

            } catch (e) {
                console.error("Fallo en bloque, reintentando...", e);
                setTimeout(cargarBloque, 3000);
            }
        }

        async function buscarVideoYReproducir(idPost) {
            const tituloOriginal = document.getElementById('estado-titulo').innerText;
            document.getElementById('estado-titulo').innerText = "Cargando reproductor de Dzen.ru...";
            try {
                const urlIndividual = `https://www.classicofilm.com/feeds/posts/default/${idPost}?alt=json`;
                const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(urlIndividual)}`);
                const j = await r.json();
                const datos = JSON.parse(j.contents);
                const contenido = datos.entry.content.$t;

                const coincidencia = contenido.match(/<iframe[^>]+src="([^">]+)"/);
                if (coincidencia && coincidencia[1]) {
                    let urlVideo = coincidencia[1];
                    if (urlVideo.startsWith('//')) urlVideo = 'https:' + urlVideo;
                    
                    document.getElementById('reproductor').src = urlVideo;
                    document.getElementById('video-container').style.display = "block";
                    document.getElementById('btn-cerrar').focus();
                    document.getElementById('estado-titulo').innerText = "Reproduciendo película...";
                } else {
                    alert("No se detectó un reproductor incrustado en esta película.");
                    document.getElementById('estado-titulo').innerText = tituloOriginal;
                }
            } catch (e) {
                alert("Error al conectar con el servidor de vídeo.");
                document.getElementById('estado-titulo').innerText = tituloOriginal;
            }
        }

        function cerrarVideo() {
            document.getElementById('video-container').style.display = "none";
            document.getElementById('reproductor').src = "";
            document.getElementById('estado-titulo').innerText = `Catálogo Automático (${totalPeliculasCargadas} películas)`;
        }

        // Arrancar la carga del primer bloque
        cargarBloque();
    </script>
</body>
</html>
