<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassicoFilm TV Prototipo</title>
    <script src="https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/feednami-client/feednami-1.3.1.min.js"></script>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }
        h1 {
            color: #e50914;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }
        h2 { font-size: 1.5rem; margin-left: 10px; }
        
        .tv-row {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 10px;
            scroll-behavior: smooth;
        }
        .tv-row::-webkit-scrollbar { display: none; }

        .movie-card {
            min-width: 180px;
            max-width: 180px;
            background-color: #222;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            border: 3px solid transparent;
            cursor: pointer;
        }
        .movie-card:focus, .movie-card:hover {
            transform: scale(1.08);
            border-color: #fff;
            outline: none;
        }
        .movie-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }
        .movie-card p {
            padding: 8px;
            margin: 0;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <h1>ClassicoFilm TV</h1>
    <h2>Últimas Películas Añadidas</h2>
    
    <div class="tv-row" id="catalogo-tv">
        <p id="cargando">Cargando películas de cine clásico de forma segura...</p>
    </div>

    <script>
        // Dirección del feed estándar de tu blog
        const urlBlog = 'https://www.classicofilm.com/feeds/posts/default';

        function cargarPeliculas() {
            const contenedor = document.getElementById('catalogo-tv');

            // Feednami se encarga de saltar bloqueos de seguridad y procesar el contenido
            feednami.load(urlBlog, function(result) {
                if (result.error) {
                    contenedor.innerHTML = "<p>Error al conectar con las películas. Por favor, refresca la página.</p>";
                    console.error(result.error);
                } else {
                    contenedor.innerHTML = "";
                    const entradas = result.feed.entries;

                    entradas.forEach((entrada, index) => {
                        const titulo = entrada.title;
                        
                        // Buscamos si el post tiene una imagen dentro de su código
                        let imagenUrl = "https://via.placeholder.com/180x260?text=Cine+Clasico";
                        
                        // Intentar extraer la imagen del contenido del post
                        if (entrada.description) {
                            const coincidenciaImg = entrada.description.match(/<img[^>]+src="([^">]+)"/);
                            if (coincidenciaImg && coincidenciaImg[1]) {
                                imagenUrl = coincidenciaImg[1];
                            }
                        }

                        const tarjeta = document.createElement('div');
                        tarjeta.className = 'movie-card';
                        tarjeta.tabIndex = index + 1; 
                        tarjeta.innerHTML = `
                            <img src="${imagenUrl}" alt="${titulo}">
                            <p>${titulo}</p>
                        `;

                        tarjeta.addEventListener('click', () => {
                            alert("Has seleccionado: " + titulo);
                        });

                        contenedor.appendChild(tarjeta);
                    });
                }
            });
        }

        // Ejecutar al cargar la página
        cargarPeliculas();
    </script>
</body>
</html>
