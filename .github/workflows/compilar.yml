name: Generar IPK de Clasicofilm TV

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Instalar empaquetador alternativo webOS (Sin errores de LG)
      run: npm install -g webos-packager

    - name: Empaquetar la aplicación (.ipk)
      run: webos-packager .
      
    - name: Guardar el archivo .ipk generado
      uses: actions/upload-artifact@v4
      with:
        name: Clasicofilm-TV-Instalador
        path: "*.ipk"
