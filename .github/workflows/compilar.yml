name: Build webOS IPK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16'

    - name: Install Stable webOS CLI
      run: npm install -g @webos-tools/cli@2.0.1-p1

    - name: Package App
      run: ares-package .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: webos-package
        path: |
          *.ipk
