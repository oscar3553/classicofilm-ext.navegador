name: Build webOS IPK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install webOS CLI
        run: npm install -g @webos-studio/cli

      - name: Package App
        run: webos-package .

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: clasicofilm-tv-ipk
          path: "*.ipk"
