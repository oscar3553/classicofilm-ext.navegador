name: Generar IPK de Clasicofilm TV

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código del repositorio
      uses: actions/checkout@v3

    - name: Configurar Node.js Estable para LG
      uses: actions/setup-node@v3
      with:
        node-version: 16 # Usamos la versión 16 porque es donde la herramienta de LG no se rompe

    - name: Instalar herramientas CLI de LG webOS
      run: npm install -g @webos-tools/cli

    - name: Empaquetar la aplicación (.ipk)
      run: ares-package .
      
    - name: Guardar el archivo .ipk generado
      uses: actions/upload-artifact@v4
      with:
        name: Clasicofilm-TV-Instalador
        path: "*.ipk"
